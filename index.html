<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toop3D - متجر الطباعة ثلاثية الأبعاد</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>

    <!-- الهيدر الرئيسي للمتجر -->
    <header class="main-header">
        <h1>Toop3D</h1>
        <p>متجر الطباعة ثلاثية الأبعاد</p>
    </header>

    <!-- 📌 شريط التنقل العلوي يشمل الرئيسية والمنتجات والتصنيفات جنباً إلى جنب -->
    <nav class="navbar" style="display: flex; align-items: center; gap: 15px; overflow-x: auto; white-space: nowrap; padding: 10px 20px;">
        <a href="#" class="nav-link">الرئيسية</a>
        <a href="#products" class="nav-link active-link">المنتجات</a>
        
        <!-- فاصل بسيط بين الصفحات والتصنيفات -->
        <span style="color: #cbd5e1;">|</span>

        <!-- أزرار التصنيفات بجانب المنتجات -->
        <button class="sub-cat-btn active" onclick="filterCategory('ALL', this)">الكل</button>
        <button class="sub-cat-btn" onclick="filterCategory('PLA', this)">PLA Filament</button>
        <button class="sub-cat-btn" onclick="filterCategory('PETG', this)">PETG Filament</button>
        <button class="sub-cat-btn" onclick="filterCategory('TPU', this)">TPU (Flex)</button>
        <button class="sub-cat-btn" onclick="filterCategory('ABS', this)">ABS / ASA</button>
        <button class="sub-cat-btn" onclick="filterCategory('RESIN', this)">3D Resin</button>
    </nav>

    <!-- قسم الهيرو (Hero Section) -->
    <section class="hero-section">
        <div class="hero-overlay">
            <div class="hero-content">
                <h1 class="hero-title">Toop3D <span>Best QUALITY FILAMENT</span></h1>
                <ul class="hero-features">
                    <li>✓ High-Speed Printing (طباعة عالية السرعة)</li>
                    <li>✓ Excellent Toughness (متانة ممتازة)</li>
                    <li>✓ Strong Layer Adhesion (التحام قوي للطبقات)</li>
                </ul>
                <div class="hero-buttons">
                    <a href="#products" class="btn-primary">تسوق الآن / Buy Now</a>
                </div>
            </div>
        </div>
    </section>

    <!-- قسم المنتجات الرئيسي -->
    <main style="max-width: 1200px; margin: 30px auto; padding: 0 20px;">
        <section id="products">
            <h2 style="border-bottom: 2px solid #2563eb; padding-bottom: 8px; color: #0f172a; margin-bottom: 20px;">
                قائمة المنتجات
            </h2>

            <!-- حاوية عرض المنتجات المفلترة -->
            <div id="products-container" class="products-grid"></div>
        </section>
    </main>

    <!-- ملف الجافاسكربت -->
    <script src="js/app.js?v=3"></script>
</body>
</html>
